name: Run Bot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: |
          pip install -r requirements.txt
          playwright install

      - name: Lancer bot
        run: python bot.py
