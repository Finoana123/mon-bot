
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Auto-Claim</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; }
    .container { width: 600px; margin: 30px auto; background:#fff; padding:20px; border-radius:8px; }
    h2 { color:#333; }
    label { display:block; margin-top:10px; }
    input, select { width:100%; padding:8px; margin-top:5px; }
    .btn { margin-top:15px; padding:10px; background:#007bff; color:#fff; border:none; cursor:pointer; }
    .btn:hover { background:#0056b3; }
    .result { margin-top:20px; padding:10px; background:#e9ecef; border-radius:5px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Gestion des comptes</h2>
    <form id="accountForm">
      <label>Email *</label>
      <input type="email" id="email" placeholder="exemple@mail.com" required>

      <label>Mot de passe *</label>
      <input type="password" id="password" placeholder="Votre mot de passe" required>

      <label>Attente avant réclamation (min:sec) *</label>
      <input type="text" id="attente" placeholder="mm:ss">

      <label>Base URL *</label>
      <input type="text" id="baseurl" value="tronpick.io">

      <label>Proxy</label>
      <input type="text" id="proxy" placeholder="socks5h://user:pass@127.0.0.1:1080">

      <label>
        <input type="checkbox" id="auto_game"> Activer le Game Auto
      </label>

      <button type="submit" class="btn">+ Ajouter le compte</button>
    </form>

    <div id="result" class="result"></div>
  </div>

  <script>
    const form = document.getElementById("accountForm");
    const result = document.getElementById("result");

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const attente = document.getElementById("attente").value;
      const baseurl = document.getElementById("baseurl").value;
      const proxy = document.getElementById("proxy").value;
      const autoGame = document.getElementById("auto_game").checked ? "Oui" : "Non";

      result.innerHTML = `
        <h3>Compte ajouté :</h3>
        Email : ${email}<br>
        Mot de passe : ${password}<br>
        Attente : ${attente}<br>
        Base URL : ${baseurl}<br>
        Proxy : ${proxy}<br>
        Game Auto : ${autoGame}<br>
      `;
    });
  </script>
</body>
</html>
